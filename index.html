<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .main{
            width: 700px;
            height: 860px;         
        }
        .Head{
            height: 100px;
            width: auto;
            border: solid black 1px;
            background: #e6e4e4;
        }
        .myWeather{
            display: flex;
            align-items: center;
            gap: 330px;
            height: 60px;
            width: auto;
            color: rgb(32, 145, 165);
            font-weight: bold;
            margin-left: 15px;
        }
        .buttons{
            height: 40px;
            width: auto;
            background-color: rgb(53, 52, 52);
            display: flex;
            align-items: center;
            padding-left: 50px;
        }
        .mainButtons{
            background-color: rgb(53, 52, 52);
            height: 40px;
            color: white;
        }

        
        .todayForecast
        {
            height: 670px;
            width: auto;
            border: solid black 1px;
            display: none;
            background: #e6e4e4;
        }

        .currentWeather{
            display: flex;
            height: 200px;
            width: auto;
            margin: 20px;
            background-color: #fff;
        }

        .hourly{
            height: 400px;
            width: auto;
            background-color: #fff;
            margin: 20px;
        }
        .curWea {          
            margin: 10px;
            padding: 15px;
            font-family: Arial, sans-serif;
        }

        .curHead{
            display: flex;
            gap: 350px;
            color: #2091a5;
            font-weight: bold;
        }

        .curMiddle{
            display: flex;
            align-items: center;
            flex-direction: row;
            gap: 90px;
        }
        .image{
            height: 140px;
            width: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;       
        }
        .degs{
            height: 50px;
            width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;   
        }
        .temp{
            font-size: 48px;
            margin: 0;
        }
        .active 
        {
            background-color: #f0f0f0; 
            color: rgb(32, 145, 165);
            font-weight: bold;
        }

        .curHourly{
            width: 600px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;    
        }

        .divHoulry {
            width: 85px; 
            height: auto; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .divHToday {
            align-items: flex-start; 
            padding-left: 10px;
            font-weight: bold;
        }
        .pToday{
            font-size: larger;
            font-weight: 20px;
            color: rgb(80, 80, 80);    
        }
        
        .fiveDayForecast{
            display: none;
            height: 720px;
            width: auto;
            border: solid black 1px;         
            background: #e6e4e4;
        }


        .fiveDays{
            width: auto;
            height: 250px;
            margin: 20px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            
        }
        .oneDay{
            width: 126px;
            height: 250px;
            background-color: #fff;
            border: 0px;
            cursor: pointer;
        }

        .hourlyFiveDays{
            height: 400px;
            width: auto;
            background-color: #fff;
            margin: 20px;
        }
        .oneDay.selectedDay {
            background-color: #cecece; 
            font-weight: bold;
        }

        .error{
            display: none;
            height: 300px;
            width: auto;
            border: solid black 1px;
            background: #e6e4e4;
        }

        .errDiv {
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center; 
            color: #5f5f5f;
            font-weight: bold;
        }

        .fof {
            width: 200px; 
            height: auto;
            padding-bottom: 5px;
        }

        .errText p {
            margin: 2px 0; 
            line-height: 1.2; 
        }
    </style>

    
</head>
<body>

    <div class = "main">

        <div class = "Head">
        <div class = "myWeather">
            <p>MY WEATHER</p>
            <div>
                <input type="search" id = "mainInput"> 
                <button id = "buttonFind">Find</button>
            </div>
            
            
        </div>
        <div class = "buttons">
            <button class = "mainButtons" id = "today">Today</button>
            <button class = "mainButtons" id = "fiveDay">5-day forecast</button>
        </div>
        
    </div>

    <div class = "todayForecast">
        <div class = "currentWeather">
            
        </div>
        <div class = "hourly"></div>
    </div>

    <div class = "fiveDayForecast">
        <div class = "fiveDays">  </div>
        <div class = "hourlyFiveDays"> </div>
    </div>

    <div class = "error">

    </div>
    




     <script src="./script.js"></script>

    </body>
</html>
